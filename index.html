<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <h2>Exo 1 Simple hover</h2>
        <div class="box box-hover">Hover</div>
        <h2>Exo 2 Progression bar (hover)</h2>
        <div class="barre">
            <div class="remplissage"></div>
        </div>
        <h2>Exo 3 Throbber</h2>
        <div class="throbber"></div>
        <h2>Exo 4 Text pulse</h2>
        <div class="pulse">
            <h1>NOUVEAU</h1>
        </div>
        <h2>Exo 5 Cards reveal</h2>
        <div>
            <img src="source/card1.webp" alt="carte 1" class="card" id="card1">
            <img src="source/card2.webp" alt="carte 2" class="card" id="card2">
            <img src="source/card3.webp" alt="carte 3" class="card" id="card3">
        </div>
        <h2>Exo 6 Button popup</h2>
        <div id="button">
            <h2>Clique moi</h2>
        </div>
        <div class="popup">
            <img src="source/yourAreAnIdiot.png" alt="yourAreAnIdiot">
        </div>
        <h2>Exo Localstorage</h2>
        <div id="storage">
            <h1 id="welcome_txt">Bienvenue</h1>
            <input type="text" id="name_input" placeholder="prénom">
            <div id="save_button">
                <h2>Sauvegarder</h2>
            </div>
        </div>
        <h2>Exo Variable</h2>
        <div id="var_button">
            <h3>Hover</h3>
        </div>
        <div class="var_input">
            <h3>Text size</h3>
            <input type="range">
            <p></p>
        </div>
        <div class="var_input">
            <h3>Border</h3>
            <input type="range">
            <p></p>
        </div>
        <div class="var_input">
            <h3>Padding</h3>
            <input type="range">
            <p></p>
        </div>
        <div class="var_input">
            <h3>Couleur</h3>
            <input type="color" value="#e66465">
        </div>
    </section>
</body>
</html>
